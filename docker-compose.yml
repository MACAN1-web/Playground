services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: college_rating
      POSTGRES_USER: college_app
      POSTGRES_PASSWORD: local-development-password
    ports:
      - "5432:5432"
    volumes:
      - college_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U college_app -d college_rating"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  college_postgres_data:
